name: Build & Deploy
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Determine version tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi
    - name: Build & push API
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-api:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-api:{0}', steps.version.outputs.tag) || '' }}
    - name: Build & push React
      uses: docker/build-push-action@v6
      with:
        context: ./frontend-react
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-react:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-react:{0}', steps.version.outputs.tag) || '' }}
    - name: Build & push Nginx
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-nginx:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-nginx:{0}', steps.version.outputs.tag) || '' }}
    - name: Deploy
      run: |
        cd /opt/upcycleconnect
        set_env() { grep -q "^$1=" .env && sed -i "s|^$1=.*|$1=$2|" .env || echo "$1=$2" >> .env; }
        set_env GMAIL_USER "${{ secrets.GMAIL_USER }}"
        set_env GMAIL_APP_PASSWORD "${{ secrets.GMAIL_APP_PASSWORD }}"
        set_env STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
        set_env STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
        set_env VAPID_PRIVATE_KEY "${{ secrets.VAPID_PRIVATE_KEY }}"
        set_env VAPID_PUBLIC_KEY "${{ secrets.VAPID_PUBLIC_KEY }}"
        set_env JWT_SECRET "${{ secrets.JWT_SECRET }}"
        docker compose pull
        docker compose up -d --force-recreate --no-deps api
        sleep 5
        docker compose up -d --force-recreate --no-deps react
        sleep 5
        docker compose up -d --force-recreate --no-deps nginx
        echo "✅ Déploiement réussi $(date)" >> /root/deploy.log
