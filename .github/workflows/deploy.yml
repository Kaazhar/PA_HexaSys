name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Decode SSH key
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d --ignore-garbage > /tmp/deploy_key
        chmod 600 /tmp/deploy_key

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 51.83.154.80
        username: debian
        key_path: /tmp/deploy_key
        port: 2222
        script: |
          git config --global --add safe.directory /opt/upcycleconnect
          cd /opt/upcycleconnect
          git pull origin main
          docker compose up -d --build
          docker compose restart nginx
          echo "✅ Déploiement réussi à $(date)" >> /home/debian/deploy.log
