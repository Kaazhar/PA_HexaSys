name: Build & Deploy
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build & push API
      run: |
        docker build -t esgipa2rte/upcycle-api:latest ./backend
        docker push esgipa2rte/upcycle-api:latest
    - name: Build & push React
      run: |
        docker build -t esgipa2rte/upcycle-react:latest ./frontend-react
        docker push esgipa2rte/upcycle-react:latest
    - name: Build & push Nginx
      run: |
        docker build -t esgipa2rte/upcycle-nginx:latest ./nginx
        docker push esgipa2rte/upcycle-nginx:latest
    - name: Deploy
      run: |
        cp docker-compose.yml /opt/upcycleconnect/docker-compose.yml
        cd /opt/upcycleconnect
        set_env() { grep -q "^$1=" .env && sed -i "s|^$1=.*|$1=$2|" .env || echo "$1=$2" >> .env; }
        set_env GMAIL_USER "${{ secrets.GMAIL_USER }}"
        set_env GMAIL_APP_PASSWORD "${{ secrets.GMAIL_APP_PASSWORD }}"
        set_env STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
        set_env STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
        set_env VAPID_PRIVATE_KEY "${{ secrets.VAPID_PRIVATE_KEY }}"
        set_env VAPID_PUBLIC_KEY "${{ secrets.VAPID_PUBLIC_KEY }}"
        set_env JWT_SECRET "${{ secrets.JWT_SECRET }}"
        docker compose pull
        docker compose up -d --force-recreate --no-deps api
        sleep 5
        docker compose up -d --force-recreate --no-deps react
        sleep 5
        docker compose up -d --force-recreate --no-deps nginx
        echo "✅ Déploiement réussi $(date)" >> /root/deploy.log
