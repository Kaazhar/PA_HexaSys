name: Build & Deploy
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Determine version tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi
    - name: Build & push API
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-api:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-api:{0}', steps.version.outputs.tag) || '' }}
    - name: Build & push React
      uses: docker/build-push-action@v6
      with:
        context: ./frontend-react
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-react:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-react:{0}', steps.version.outputs.tag) || '' }}
    - name: Build & push Nginx
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        platforms: linux/amd64
        push: true
        tags: |
          esgipa2rte/upcycle-nginx:latest
          ${{ steps.version.outputs.tag != 'latest' && format('esgipa2rte/upcycle-nginx:{0}', steps.version.outputs.tag) || '' }}
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        cat >> ~/.ssh/config << 'EOF'
        Host proxmox
          HostName 82.66.207.249
          Port 2222
          User root
          StrictHostKeyChecking no
          IdentityFile ~/.ssh/id_rsa
        Host eveng
          HostName 10.10.0.200
          User root
          StrictHostKeyChecking no
          ProxyJump proxmox
          IdentityFile ~/.ssh/id_rsa
        Host serveur-web
          HostName 192.168.80.10
          User root
          StrictHostKeyChecking no
          ProxyJump eveng
          IdentityFile ~/.ssh/id_rsa
        EOF
    - name: Deploy via SSH
      run: |
        ssh serveur-web "cd /opt/upcycleconnect && sed -i 's|^GMAIL_USER=.*|GMAIL_USER=${{ secrets.GMAIL_USER }}|' .env && sed -i 's|^GMAIL_APP_PASSWORD=.*|GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}|' .env && docker compose pull && docker restart upcycle_api && sleep 5 && docker restart upcycle_react && sleep 5 && docker restart upcycle_nginx && echo '✅ Déploiement réussi' >> /root/deploy.log"
