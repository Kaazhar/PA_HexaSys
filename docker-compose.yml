services:
  db:
    image: postgres:15-alpine
    container_name: upcycle_db
    restart: always
    environment:
      POSTGRES_DB: upcycleconnect
      POSTGRES_USER: upcycle_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U upcycle_user -d upcycleconnect
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: upcycle_api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: upcycle_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: upcycleconnect
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    expose:
      - 8080

  react:
    build: ./frontend-react
    container_name: upcycle_react
    restart: always
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    networks:
      - frontend
    expose:
      - 3000

  web:
    build: ./frontend
    container_name: upcycle_web
    restart: always
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
    networks:
      - frontend
    expose:
      - 80

  nginx:
    image: nginx:alpine
    container_name: upcycle_nginx
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - api
      - web
      - react
    networks:
      - frontend

networks:
  backend:
  frontend:

volumes:
  db_data:
