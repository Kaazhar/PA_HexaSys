services:
  db:
    image: mysql:8.0
    container_name: upcycle_db
    restart: always
    environment:
      MYSQL_DATABASE: upcycleconnect
      MYSQL_USER: upcycle_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - upcycle_user
        - -p${DB_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: upcycle_api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: upcycle_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: upcycleconnect
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    expose:
      - 8080

  react:
    build: ./frontend-react
    container_name: upcycle_react
    restart: always
    networks:
      - frontend
    expose:
      - 80

  nginx:
    image: nginx:alpine
    container_name: upcycle_nginx
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - api
      - react
    networks:
      - frontend

networks:
  backend:
  frontend:

volumes:
  db_data:
